<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Spell-Sprint: B2 L5-L6</title>
    <!-- 引入可愛的圓體中英文字型與 Tailwind CSS 提升排版層次 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FFF0F2 0%, #E6F0FA 100%);
            --theme-color: #FFB7B2;
            --theme-dark: #FF9AA2;
            --text-main: #6C5B7B;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 16px;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Comfortaa', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
        }

        /* 手機與平板專用的自適應高彈性容器 */
        #canvasWrapper {
            position: relative;
            background: #FFFFFF;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(255, 183, 178, 0.35);
            overflow: hidden;
            border: 4px solid #FFFFFF;
            width: 100%;
            max-width: 450px;       /* 適合手機與平板的最佳黃金寬度 */
            aspect-ratio: 500 / 650; /* 鎖定原始設計寬高比，不跑版 */
            margin: auto;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        /* 浮動拼字輸入框：百分百由 CSS 自適應控制高度 (28%) 與寬度，防止被鍵盤遮擋 */
        #spellingInput {
            position: absolute;
            display: none;
            left: 15%;
            top: 28%;
            width: 70%;
            height: 7.5%;
            border: 3px solid #FFD1D1;
            border-radius: 20px;
            font-size: 18px; /* 大於 16px 防止 iOS 瀏覽器自動縮放 */
            text-align: center;
            color: #6C5B7B;
            font-family: 'Comfortaa', sans-serif;
            outline: none;
            background: #FFF9F9;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            transition: border-color 0.3s, box-shadow 0.3s;
            z-index: 50;
        }

        #spellingInput:focus {
            border-color: #FFB7B2;
            box-shadow: 0 0 8px rgba(255, 183, 178, 0.6);
        }
    </style>
</head>
<body>

<div id="canvasWrapper">
    <canvas id="appCanvas" width="500" height="650"></canvas>
    
    <!-- 拼字輸入框：強制在行動裝置預設跳出「英文鍵盤」 -->
    <input type="text" id="spellingInput" lang="en" inputmode="text" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="請拼出這個英文單字...">
</div>

<!-- 客製化清新馬卡龍彈出式視窗 (取代傳統 alert，極致美學不跳框) -->

    <div class="bg-white rounded-3xl p-6 max-w-sm w-full text-center border-4 border-pink-100 shadow-2xl transform scale-95 transition-transform duration-300">
        <div class="w-16 h-16 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <span id="modalIcon" class="text-3xl">💡</span>
        </div>
        <h3 id="modalTitle" class="text-xl font-bold text-slate-700 mb-2">溫馨提示</h3>
        <p id="modalContent" class="text-slate-500 mb-6 leading-relaxed">正確答案是...</p>
        <button id="modalBtn" class="bg-gradient-to-r from-pink-300 to-rose-300 hover:from-pink-400 hover:to-rose-400 text-white font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-md transform hover:-translate-y-0.5">
            好、我知道了！
        </button>
    </div>
</div>

    // 自製客製化彈出式視窗控制函式
    function showCuteModal(title, text, type = 'info', callback = null) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalContent').innerHTML = text;
        const iconEl = document.getElementById('modalIcon');
        
        if (type === 'success') {
            iconEl.innerText = '🌸';
            iconEl.parentElement.className = "w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4";
        } else if (type === 'error') {
            iconEl.innerText = '💧';
            iconEl.parentElement.className = "w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4";
        } else {
            iconEl.innerText = '💡';
            iconEl.parentElement.className = "w-16 h-16 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-4";
        }

        const modal = document.getElementById('customModal');
        modal.classList.remove('hidden');
        
        const btn = document.getElementById('modalBtn');
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        
        newBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
            if (callback) callback();
        });
    }

    function initFloatingBackground() {
        floatingElements = [];
        for (let i = 0; i < 8; i++) {
            floatingElements.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 15 + 10,
                speedY: Math.random() * 0.4 + 0.2,
                type: Math.random() > 0.5 ? 'heart' : 'star',
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    // 音效管理器
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playChime(success) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (success) {
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(783.99, audioCtx.currentTime + 0.15); 
            osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.3); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else {
            osc.type = 'triangle';
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.frequency.setValueAtTime(293.66, audioCtx.currentTime); 
            osc.frequency.linearRampToValueAtTime(196.00, audioCtx.currentTime + 0.25); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    // 語音發音
    function speakBaseWord(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'en-US';
            speech.rate = 0.82; 
            window.speechSynthesis.speak(speech);
        }
    }

    function drawRoundedRect(x, y, w, h, r, fillColor, strokeColor, shadow = false) {
        ctx.save();
        if (shadow) {
            ctx.shadowColor = 'rgba(255, 183, 178, 0.25)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 8;
        }
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        if (fillColor) {
            ctx.fillStyle = fillColor;
            ctx.fill();
        }
        ctx.restore();
        if (strokeColor) {
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }
    }

    function drawCuteButton(id, text, x, y, w, h, baseColor, hoverColor, onClick) {
        drawRoundedRect(x, y, w, h, 20, baseColor, '#FFFFFF', true);
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 18px "Noto Sans TC"';
        ctx.fillText(text, x + w/2, y + h/2 + 1);
        buttonRegions.push({ id, x, y, w, h, onClick });
    }

    function drawTextWrapped(text, x, y, maxWidth, lineHeight, color, fontSpec) {
        ctx.fillStyle = color;
        ctx.font = fontSpec;
        let words = Array.from(text);
        let line = "";
        let currentY = y;
        for (let i = 0; i < words.length; i++) {
            let testLine = line + words[i];
            let metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && i > 0) {
                ctx.fillText(line, x, currentY);
                line = words[i];
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        ctx.fillText(line, x, currentY);
        return currentY;
    }

    function spawnCelebrationBurst(x, y) {
        const colors = ['#FFB7B2', '#FF9AA2', '#B5EAD7', '#FFDAC1', '#E2F0CB'];
        for (let i = 0; i < 30; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8 - 3,
                size: Math.random() * 8 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                alpha: 1,
                decay: Math.random() * 0.02 + 0.015,
                shape: Math.random() > 0.5 ? 'star' : 'heart'
            });
        }
    }

    function drawCustomShape(ctx, x, y, size, shape) {
        ctx.beginPath();
        if (shape === 'star') {
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(x + Math.cos((18 + i * 72) * Math.PI / 180) * size,
                           y - Math.sin((18 + i * 72) * Math.PI / 180) * size);
                ctx.lineTo(x + Math.cos((54 + i * 72) * Math.PI / 180) * (size/2),
                           y - Math.sin((54 + i * 72) * Math.PI / 180) * (size/2));
            }
        } else {
            ctx.moveTo(x, y + size/4);
            ctx.bezierCurveTo(x - size/2, y - size/2, x - size, y + size/3, x, y + size);
            ctx.bezierCurveTo(x + size, y + size/3, x + size/2, y - size/2, x, y + size/4);
        }
        ctx.closePath();
        ctx.fill();
    }

    function updateAndDraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        buttonRegions = [];

        if (appState !== 'QUIZ') {
            spellingInput.style.display = 'none';
        }

        // 背景
        let bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGradient.addColorStop(0, '#FFF5F5');
        bgGradient.addColorStop(1, '#EEF5FF');
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 背景漂浮物
        ctx.fillStyle = 'rgba(255, 183, 178, 0.15)';
        floatingElements.forEach(item => {
            item.y -= item.speedY;
            item.phase += 0.01;
            let currentX = item.x + Math.sin(item.phase) * 1.5;
            if (item.y < -30) {
                item.y = canvas.height + 30;
                item.x = Math.random() * canvas.width;
            }
            drawCustomShape(ctx, currentX, item.y, item.size, item.type);
        });

        switch (appState) {
            case 'MAIN_MENU':
                renderMainMenu();
                break;
            case 'MODE_SELECT':
                renderModeSelect();
                break;
            case 'FLASHCARD':
                renderFlashcard();
                break;
            case 'QUIZ':
                renderQuiz();
                break;
            case 'SCOREBOARD':
                renderScoreboard();
                break;
        }

        // 爆炸粒子
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1; 
            p.alpha -= p.decay;
            if (p.alpha <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                drawCustomShape(ctx, p.x, p.y, p.size, p.shape);
                ctx.restore();
            }
        }

        requestAnimationFrame(updateAndDraw);
    }

    function renderMainMenu() {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.fillStyle = '#FF7B89';
        ctx.font = '700 30px "Noto Sans TC"';
        ctx.fillText('✨ 國中英語單字卡 ✨', 250, 110);
        
        ctx.fillStyle = '#9C88B9';
        ctx.font = '500 16px "Noto Sans TC"';
        ctx.fillText('用互動與粉彩網頁陪你輕鬆記住 1200 單！', 250, 155);

        // L5 按鈕
        drawRoundedRect(70, 230, 160, 150, 24, '#FFFFFF', '#FFE4E1', true);
        ctx.fillStyle = '#FF7B89';
        ctx.font = '700 28px "Comfortaa"';
        ctx.fillText('L5', 150, 280);
        ctx.fillStyle = '#9C88B9';
        ctx.font = '700 15px "Noto Sans TC"';
        ctx.fillText('第 5 課', 150, 315);
        ctx.font = '500 11px "Noto Sans TC"';
        ctx.fillStyle = '#BBB0CC';
        ctx.fillText('生活與科技詞彙', 150, 345);
        buttonRegions.push({ id: 'LESSON_5', x: 70, y: 230, w: 160, h: 150, onClick: () => selectLesson(5) });

        // L6 按鈕
        drawRoundedRect(270, 230, 160, 150, 24, '#FFFFFF', '#FFE4E1', true);
        ctx.fillStyle = '#6C5B7B';
        ctx.font = '700 28px "Comfortaa"';
        ctx.fillText('L6', 350, 280);
        ctx.fillStyle = '#9C88B9';
        ctx.font = '700 15px "Noto Sans TC"';
        ctx.fillText('第 6 課', 350, 315);
        ctx.font = '500 11px "Noto Sans TC"';
        ctx.fillStyle = '#BBB0CC';
        ctx.fillText('大自然與旅遊詞彙', 350, 345);
        buttonRegions.push({ id: 'LESSON_6', x: 270, y: 230, w: 160, h: 150, onClick: () => selectLesson(6) });

        ctx.font = '500 12px "Noto Sans TC"';
        ctx.fillStyle = '#B1C2D4';
        ctx.fillText('點選上方圖案直接開啟學習旅程 🎈', 250, 480);
    }

    function renderModeSelect() {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.fillStyle = '#FF7B89';
        ctx.font = '700 24px "Noto Sans TC"';
        ctx.fillText(`✨ 第 ${selectedLesson} 課學習選項 ✨`, 250, 120);

        drawCuteButton('MODE_FC', '🗂️ 互動單字卡模式', 100, 220, 300, 60, '#FFB7B2', '#FFA4A0', startFlashcardMode);
        drawCuteButton('MODE_QZ', '✍️ 拼字金頭腦測驗', 100, 310, 300, 60, '#C7CEEA', '#B9C2E7', startQuizMode);
        drawCuteButton('MODE_BACK', '返回主單元選單', 150, 440, 200, 45, '#E2F0CB', '#D4E8B7', () => { appState = 'MAIN_MENU'; });
    }

    function renderFlashcard() {
        if (fcIndex >= fcList.length || fcList.length === 0) {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#9C88B9';
            ctx.font = '700 20px "Noto Sans TC"';
            ctx.fillText('正在讀取單字庫...', 250, 325);
            return;
        }

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#9C88B9';
        ctx.font = '500 13px "Comfortaa"';
        ctx.fillText(`CARD: ${fcIndex + 1} / ${fcList.length}`, 250, 35);

        let progress = (fcIndex + 1) / fcList.length;
        drawRoundedRect(50, 50, 400, 8, 4, '#F0E5F2', null);
        drawRoundedRect(50, 50, 400 * progress, 8, 4, '#B5EAD7', null);

        ctx.save();
        ctx.translate(250, 250); 

        let scaleX = Math.abs(Math.cos(cardFlipAngle * Math.PI / 180));
        ctx.scale(scaleX, 1);

        let isBackActive = (cardFlipAngle > 90);
        let word = fcList[fcIndex];

        if (!isBackActive) {
            drawRoundedRect(-180, -140, 360, 280, 28, '#FFFFFF', '#FFE4E1', true);
            
            ctx.fillStyle = '#FF7B89';
            ctx.font = '700 32px "Comfortaa"';
            ctx.textAlign = 'center';
            ctx.fillText(word.word, 0, -35);

            ctx.font = '700 13px "Noto Sans TC"';
            let tagWidth = ctx.measureText(word.pos).width + 16;
            drawRoundedRect(-tagWidth/2, 10, tagWidth, 24, 12, '#E8F0FE', null);
            ctx.fillStyle = '#4285F4';
            ctx.fillText(word.pos, 0, 22);

            // 完美的動詞三態呈現
            if (word.verbs || word.pos.includes("動")) {
                let verbsText = word.verbs ? word.verbs : `${word.word} - ${word.word}ed - ${word.word}ed`;
                ctx.font = 'italic 500 13px "Comfortaa"';
                ctx.fillStyle = '#FF7B89';
                ctx.fillText(`三態: ${verbsText}`, 0, 60);
            }

            ctx.font = '500 11px "Noto Sans TC"';
            ctx.fillStyle = '#D1C4E9';
            ctx.fillText('💡 點擊卡片任何地方即可翻面', 0, 105);
        } else {
            // 背面：移除任何鏡像文字，由左至右順暢閱讀
            drawRoundedRect(-180, -140, 360, 280, 28, '#FFF5F8', '#FFD1D1', true);

            ctx.fillStyle = '#4A4A4A';
            ctx.font = '700 24px "Noto Sans TC"';
            ctx.textAlign = 'center';
            ctx.fillText(word.trans, 0, -75);

            ctx.strokeStyle = '#FFE4E1';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(-140, -45); ctx.lineTo(140, -45); ctx.stroke();
            ctx.setLineDash([]);

            ctx.textAlign = 'left';
            let lastY = drawTextWrapped(`Ex: ${word.sentence}`, -140, -15, 280, 22, '#555555', '500 14px "Comfortaa"');
            drawTextWrapped(word.sentenceZh, -140, lastY + 25, 280, 20, '#777777', '500 13px "Noto Sans TC"');
        }

        ctx.restore();

        buttonRegions.push({ id: 'FC_FLIP', x: 70, y: 110, w: 360, h: 280, onClick: flipCardAction });

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        drawCuteButton('FC_YES', '👍 記住了', 60, 440, 170, 48, '#98DDCA', '#85CBB8', () => handleFamiliarity(true));
        drawCuteButton('FC_NO', '❓ 還不熟', 270, 440, 170, 48, '#FFAAA6', '#FF928C', () => handleFamiliarity(false));
        drawCuteButton('FC_EXIT', '回學習選單', 170, 520, 160, 40, '#D4E2F7', '#B9CEEB', () => { appState = 'MODE_SELECT'; });
    }

    function renderQuiz() {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#9C88B9';
        ctx.font = '500 13px "Comfortaa"';
        ctx.fillText(`TESTING: ${qIndex + 1} / ${initialCount}`, 250, 35);

        let progress = (qIndex) / initialCount;
        drawRoundedRect(50, 50, 400, 8, 4, '#F0E5F2', null);
        drawRoundedRect(50, 50, 400 * progress, 8, 4, '#FFD3B6', null);

        const activeQ = qList[qIndex];

        // 題目與關鍵操控元件整體往上提，極速避開手機虛擬鍵盤遮擋
        ctx.fillStyle = '#6C5B7B';
        ctx.font = '700 24px "Noto Sans TC"';
        ctx.fillText(`【${activeQ.pos}】 ${activeQ.trans}`, 250, 110);

        // 啟用並顯示輸入框 (百分百由 RWD CSS 靜態對齊定位)
        spellingInput.style.display = 'block';

        // 送出答案與放棄按鈕向上集中
        drawCuteButton('QZ_SUBMIT', '送出答案', 150, 260, 200, 48, '#FFB7B2', '#FFA4A0', submitSpellingAnswer);
        drawCuteButton('QZ_EXIT', '放棄測驗', 170, 325, 160, 40, '#C7CEEA', '#B9C2E7', () => {
            spellingInput.style.display = 'none';
            appState = 'MODE_SELECT';
        });
    }

    function renderScoreboard() {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.fillStyle = '#FF7B89';
        ctx.font = '700 30px "Noto Sans TC"';
        ctx.fillText('✨ 挑戰成果報告 ✨', 250, 130);

        let accuracy = Math.round((correctCount / initialCount) * 100);

        ctx.fillStyle = '#555555';
        ctx.font = '500 16px "Noto Sans TC"';
        ctx.fillText('第一次拼字完美成功率：', 250, 220);

        ctx.fillStyle = '#FF7B89';
        ctx.font = '700 52px "Comfortaa"';
        ctx.fillText(`${accuracy}%`, 250, 290);

        ctx.fillStyle = '#9C88B9';
        ctx.font = '500 13px "Noto Sans TC"';
        ctx.fillText('(寫錯的單字已在剛才的挑戰中重複練習至滿分)', 250, 360);

        drawCuteButton('SCORE_OK', '太棒了！返回選單', 140, 430, 220, 50, '#B5EAD7', '#A0DAC2', () => {
            appState = 'MODE_SELECT';
        });
    }

    function selectLesson(lNum) {
        selectedLesson = lNum;
        appState = 'MODE_SELECT';
    }

    function startFlashcardMode() {
        fcList = [...VOCABULARY[selectedLesson]].sort(() => Math.random() - 0.5);
        fcIndex = 0;
        isFlipped = false;
        cardFlipAngle = 0;
        isAnimating = false;
        appState = 'FLASHCARD';
        setTimeout(() => speakBaseWord(fcList[fcIndex].clean), 300);
    }

    function flipCardAction() {
        if (isAnimating) return;
        isAnimating = true;
        animateCardFlip();
    }

    function animateCardFlip() {
        let step = 15;
        if (!isFlipped) {
            cardFlipAngle += step;
            if (cardFlipAngle >= 180) {
                cardFlipAngle = 180;
                isFlipped = true;
                isAnimating = false;
                return;
            }
        } else {
            cardFlipAngle -= step;
            if (cardFlipAngle <= 0) {
                cardFlipAngle = 0;
                isFlipped = false;
                isAnimating = false;
                return;
            }
        }
        requestAnimationFrame(animateCardFlip);
    }

    function handleFamiliarity(known) {
        if (isAnimating) return;
        let activeWord = fcList[fcIndex];

        if (!known) {
            let targetPos = fcIndex + Math.floor(Math.random() * 3) + 3;
            if (targetPos > fcList.length) targetPos = fcList.length;
            fcList.splice(targetPos, 0, activeWord);
            fcIndex++;
        } else {
            spawnCelebrationBurst(250, 250);
            playChime(true);
            fcIndex++;
        }

        if (fcIndex >= fcList.length) {
            playChime(true);
            fcIndex = fcList.length - 1; // 預防畫面前瞻性閃爍
            
            showCuteModal("🎉 太棒了！", "你已經完成這個單元所有的英語單字卡學習囉！", "success", () => {
                appState = 'MODE_SELECT';
            });
        } else {
            isFlipped = false;
            cardFlipAngle = 0;
            setTimeout(() => speakBaseWord(fcList[fcIndex].clean), 250);
        }
    }

    function startQuizMode() {
        qList = [...VOCABULARY[selectedLesson]].sort(() => Math.random() - 0.5);
        qList.forEach(item => item.perfectEntry = true);
        
        qIndex = 0;
        initialCount = qList.length;
        correctCount = 0;
        appState = 'QUIZ';
        
        spellingInput.value = "";
        setTimeout(() => spellingInput.focus(), 200);
    }

    function submitSpellingAnswer() {
        let guess = spellingInput.value.trim().toLowerCase();
        let target = qList[qIndex];

        let targetClean = target.clean.toLowerCase();
        let targetWord = target.word.toLowerCase();

        if (guess === targetClean || guess === targetWord || (guess === 'surf the net' && targetClean === 'surf the internet')) {
            spawnCelebrationBurst(250, 140); // 爆裂粒子位置同步上推
            playChime(true);

            if (target.perfectEntry) {
                correctCount++;
            }

            qIndex++;
            spellingInput.value = "";

            if (qIndex >= qList.length) {
                spellingInput.style.display = 'none';
                appState = 'SCOREBOARD';
            } else {
                setTimeout(() => spellingInput.focus(), 50);
            }
        } else {
            playChime(false);
            spellingInput.blur();
            
            showCuteModal(
                "🌸 加油加油！", 
                `拼錯囉！正確答案是：<strong class="text-rose-400 text-lg">${target.word}</strong><br><span class="text-sm text-slate-400">（別擔心，這題會自動排到最後面，讓你再次練習！）</span>`, 
                "error", 
                () => {
                    target.perfectEntry = false;
                    let failedWord = qList.splice(qIndex, 1)[0];
                    qList.push(failedWord);
                    spellingInput.value = "";
                    setTimeout(() => spellingInput.focus(), 50);
                }
            );
        }
    }

    canvas.addEventListener('click', function(e) {
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;

        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;

        for (let i = 0; i < buttonRegions.length; i++) {
            let btn = buttonRegions[i];
            if (mouseX >= btn.x && mouseX <= btn.x + btn.w &&
                mouseY >= btn.y && mouseY <= btn.y + btn.h) {
                btn.onClick();
                break;
            }
        }
    });

    spellingInput.addEventListener('keyup', function(e) {
        if (e.key === 'Enter') {
            submitSpellingAnswer();
        }
    });

    initFloatingBackground();
    updateAndDraw();
</script>

</body>
